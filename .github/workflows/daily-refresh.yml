name: Daily Data Refresh

on:
  schedule:
    - cron: '0 3 * * *'   # 00:00 BRT (UTC-3)
  workflow_dispatch:        # permite rodar manualmente

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Create .env from secrets
        env:
          OMIE_APP_KEY: ${{ secrets.OMIE_APP_KEY }}
          OMIE_APP_SECRET: ${{ secrets.OMIE_APP_SECRET }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          [ -n "$OMIE_APP_KEY" ]      && echo "OMIE_APP_KEY=$OMIE_APP_KEY"           >> .env || true
          [ -n "$OMIE_APP_SECRET" ]   && echo "OMIE_APP_SECRET=$OMIE_APP_SECRET"     >> .env || true
          [ -n "$COOLIFY_TOKEN" ]     && echo "COOLIFY_TOKEN=$COOLIFY_TOKEN"         >> .env || true
          [ -n "$ANTHROPIC_API_KEY" ] && echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env || true

      - name: Fetch data from API
        continue-on-error: true
        run: '[ -f fetch-data.cjs ] && node fetch-data.cjs || echo "skip: fetch-data.cjs not found"'

      - name: Fetch saldos (bank balances)
        continue-on-error: true
        run: '[ -f fetch-saldos.cjs ] && node fetch-saldos.cjs || echo "skip: fetch-saldos.cjs not found"'

      - name: Build data + JSX bundle
        run: |
          node build-data.cjs
          [ -f build-data-extras.cjs ] && node build-data-extras.cjs || true
          node build-jsx.cjs

      - name: Commit and push if changed
        run: |
          git config user.email "bot@bgpgestao.online"
          git config user.name "BGP BI Bot"
          git add data.js app.bundle.js
          [ -f saldos.json ]    && git add saldos.json    || true
          [ -f data-extras.js ] && git add data-extras.js || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore: daily data refresh [skip ci]"
            git push
          fi

      - name: Trigger Coolify deploy
        if: always()
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          if [ -n "$COOLIFY_APP_UUID" ] && [ -n "$COOLIFY_TOKEN" ]; then
            curl -sf -X POST "http://187.77.238.125:8000/api/v1/deploy?uuid=$COOLIFY_APP_UUID" \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              && echo "Coolify deploy triggered: $COOLIFY_APP_UUID" \
              || echo "Coolify trigger failed (non-fatal)"
          else
            echo "COOLIFY_APP_UUID or COOLIFY_TOKEN not set — skipping deploy trigger"
          fi
